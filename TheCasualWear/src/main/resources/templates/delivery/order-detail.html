<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Chi tiết đơn giao</title></head>
<body>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold">Đơn hàng #<span th:text="${order.id}"></span></h4>
    <a th:href="@{/delivery}" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
</div>

<div class="row g-4">
    <div class="col-md-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Sản phẩm</h6>
                <div th:each="detail : ${order.orderDetails}"
                     class="d-flex justify-content-between mb-2">
                    <span>
                        <strong th:text="${detail.product.name}"></strong>
                        <span class="text-muted" th:text="' x' + ${detail.quantity}"></span>
                    </span>
                    <span th:text="${#numbers.formatInteger(detail.price.doubleValue() * detail.quantity, 0, 'COMMA') + ' đ'}"></span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Tổng:</span>
                    <span class="text-danger"
                          th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-5">
        <!-- Thêm thông tin thanh toán -->
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Thông tin thanh toán</h6>

                <div class="d-flex justify-content-between mb-2">
                    <span>Phương thức:</span>
                    <span th:if="${order.paymentMethod == 'COD'}"
                          class="badge bg-warning text-dark fs-6">
                <i class="bi bi-cash-coin me-1"></i>COD - Thu tiền mặt
            </span>
                    <span th:if="${order.paymentMethod == 'VNPAY'}"
                          class="badge bg-success fs-6">
                <i class="bi bi-credit-card me-1"></i>VNPay - Đã thanh toán
            </span>
                </div>

                <div class="d-flex justify-content-between mb-2">
                    <span>Số tiền cần thu:</span>
                    <span class="fw-bold text-danger fs-5"
                          th:text="${order.paymentMethod == 'COD' and !order.isPaid ?
                            #numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ' :
                            'Đã thanh toán'}">
            </span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Trạng thái thanh toán:</span>
                    <span th:if="${order.isPaid}" class="badge bg-success">
                <i class="bi bi-check-circle me-1"></i>Đã thanh toán
            </span>
                    <span th:unless="${order.isPaid}" class="badge bg-danger">
                <i class="bi bi-x-circle me-1"></i>Chưa thanh toán
            </span>
                </div>
            </div>
        </div>

        <!-- Nút xác nhận thu tiền COD -->
        <div class="d-grid gap-2">
            <!-- Chỉ hiện khi COD + chưa thu tiền + đang giao -->
            <div th:if="${order.paymentMethod == 'COD'
                 and !order.isPaid
                 and order.status.name() == 'SHIPPING'}"
                 class="alert alert-warning">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>Nhắc nhở:</strong> Thu
                <strong th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></strong>
                tiền mặt từ khách!
            </div>

            <a th:if="${order.status.name() == 'SHIPPING'}"
               th:href="@{'/delivery/orders/' + ${order.id} + '/delivered'}"
               class="btn btn-success"
               th:attr="data-cod=${order.paymentMethod == 'COD' and !order.isPaid},
            data-amount=${order.totalPrice}"
               onclick="return confirmDelivery(this)">
                <i class="bi bi-check-circle me-2"></i>Xác nhận đã giao hàng
            </a>
        </div>
    </div>
</div>
<script>
    function confirmDelivery(btn) {
        const isCod = btn.dataset.cod === 'true';
        const amount = parseFloat(btn.dataset.amount)
                          .toLocaleString('vi-VN');
        if (isCod) {
            return confirm('Đã thu ' + amount + ' đ tiền mặt từ khách chưa?');
        }
        return confirm('Xác nhận đã giao hàng thành công?');
    }
</script>
</body>
</html>
