<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Chi tiết đơn giao</title></head>
<body>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold">Đơn hàng #<span th:text="${order.id}"></span></h4>
    <a th:href="@{/delivery}" class="btn btn-outline-secondary btn-sm">← Quay lại</a>
</div>

<div class="row g-4">
    <div class="col-md-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Sản phẩm</h6>
                <div th:each="detail : ${order.orderDetails}"
                     class="d-flex justify-content-between mb-2">
                    <span>
                        <strong th:text="${detail.product.name}"></strong>
                        <span class="text-muted" th:text="' x' + ${detail.quantity}"></span>
                    </span>
                    <span th:text="${#numbers.formatInteger(detail.price.doubleValue() * detail.quantity, 0, 'COMMA') + ' đ'}"></span>
                </div>
                <hr/>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Tổng:</span>
                    <span class="text-danger"
                          th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-5">
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <h6 class="fw-bold mb-3">Địa chỉ giao hàng</h6>
                <p class="mb-1 fw-bold" th:text="${order.shippingAddress.fullName}"></p>
                <p class="mb-1"><i class="bi bi-telephone me-2"></i>
                    <span th:text="${order.shippingAddress.phone}"></span></p>
                <p class="mb-0"><i class="bi bi-geo-alt me-2"></i>
                    <span th:text="${order.shippingAddress.street + ', ' +
                                    order.shippingAddress.district + ', ' +
                                    order.shippingAddress.city}"></span></p>
            </div>
        </div>

        <div class="d-grid gap-2"
             th:if="${order.status.name() == 'SHIPPING'}">
            <a th:href="@{'/delivery/orders/' + ${order.id} + '/delivered'}"
               class="btn btn-success"
               onclick="return confirm('Xác nhận đã giao hàng thành công?')">
                <i class="bi bi-check-circle me-2"></i>Xác nhận đã giao hàng
            </a>
        </div>
    </div>
</div>
</body>
</html>
