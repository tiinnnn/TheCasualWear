<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Đơn giao hàng</title></head>
<body>
<h4 class="fw-bold mb-4">Đơn hàng cần giao</h4>

<!-- Đơn đã xác nhận, chờ lấy hàng -->
<div class="mb-4">
    <h6 class="text-muted mb-3">Chờ lấy hàng (CONFIRMED)</h6>
    <div th:if="${#lists.isEmpty(confirmedOrders)}" class="text-muted">
        Không có đơn nào chờ lấy hàng.
    </div>
    <div th:each="order : ${confirmedOrders}" class="card border-0 shadow-sm mb-2">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h6 class="mb-1">Đơn #<span th:text="${order.id}"></span></h6>
                <p class="mb-0 text-muted small"
                   th:text="${order.shippingAddress.fullName + ' - ' + order.shippingAddress.phone}"></p>
                <p class="mb-0 text-muted small"
                   th:text="${order.shippingAddress.street + ', ' + order.shippingAddress.city}"></p>
            </div>
            <div class="text-end">
                <p class="text-danger fw-bold mb-2"
                   th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></p>
                <!-- Badge phương thức thanh toán -->
                <span th:if="${order.paymentMethod == 'COD'}"
                      class="badge bg-danger mb-2">
                    <i class="bi bi-cash-coin"></i> Cần thu hộ
                </span>
                <span th:if="${order.paymentMethod != 'COD'}"
                      class="badge bg-success mb-2">
                    <i class="bi bi-credit-card"></i> VNPay - 0đ
                </span>
                <a th:href="@{'/delivery/orders/' + ${order.id}}"
                   class="btn btn-sm btn-outline-dark">Chi tiết</a>
            </div>
        </div>
    </div>
</div>

<!-- Đơn đang giao -->
<div>
    <h6 class="text-muted mb-3">Đang giao (SHIPPING)</h6>
    <div th:if="${#lists.isEmpty(shippingOrders)}" class="text-muted">
        Không có đơn nào đang giao.
    </div>
    <div th:each="order : ${shippingOrders}" class="card border-0 shadow-sm mb-2">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h6 class="mb-1">Đơn #<span th:text="${order.id}"></span></h6>
                <p class="mb-0 text-muted small"
                   th:text="${order.shippingAddress.fullName + ' - ' + order.shippingAddress.phone}"></p>
                <p class="mb-0 text-muted small"
                   th:text="${order.shippingAddress.street + ', ' + order.shippingAddress.city}"></p>
            </div>
            <div class="text-end">
                <p class="text-danger fw-bold mb-2"
                   th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></p>
                <!-- Badge phương thức thanh toán -->
                <span th:if="${order.paymentMethod == 'COD'}"
                    class="badge bg-danger mb-2">
                    <i class="bi bi-cash-coin"></i> Cần thu hộ
                </span>
                <span th:if="${order.paymentMethod != 'COD'}"
                      class="badge bg-success mb-2">
                    <i class="bi bi-credit-card"></i> VNPay - 0đ
                </span>
                <div class="d-flex gap-2">
                    <a th:href="@{'/delivery/orders/' + ${order.id}}"
                       class="btn btn-sm btn-outline-dark">Chi tiết</a>
                    <a th:href="@{'/delivery/orders/' + ${order.id} + '/delivered'}"
                       class="btn btn-sm btn-success"
                       onclick="return confirm('Xác nhận đã giao hàng?')">
                        <i class="bi bi-check-lg"></i> Đã giao
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
