<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">The Casual Wear</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/shop}">Shop</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <!-- Giỏ hàng -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        🛒 Giỏ hàng
                    </a>
                </li>
                <!-- Admin -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}">Quản trị</a>
                </li>
                <!-- Delivery -->
                <li class="nav-item" sec:authorize="hasRole('DELIVERY')">
                    <a class="nav-link" th:href="@{/delivery}">Đơn giao hàng</a>
                </li>
                <!-- Tài khoản -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/account}">Tài khoản</a>
                </li>
                <!-- Đăng xuất -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/logout}">Đăng xuất</a>
                </li>
                <!-- Đăng nhập -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Đăng nhập</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
