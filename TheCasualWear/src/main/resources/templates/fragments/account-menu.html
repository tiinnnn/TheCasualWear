<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="account-menu">
    <div class="card">
        <div class="card-body text-center">
            <i class="bi bi-person-circle" style="font-size:4rem"></i>
            <h6 class="mt-2" th:text="${#authentication.name}"></h6>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <a th:href="@{/account}" class="text-decoration-none">
                    <i class="bi bi-person me-2"></i>Thông tin tài khoản
                </a>
            </li>
            <li class="list-group-item">
                <a th:href="@{/account/change-password}" class="text-decoration-none">
                    <i class="bi bi-key me-2"></i>Đổi mật khẩu
                </a>
            </li>
            <li class="list-group-item">
                <a th:href="@{/account/address}" class="text-decoration-none">
                    <i class="bi bi-geo-alt me-2"></i>Địa chỉ
                </a>
            </li>
            <li class="list-group-item">
                <a th:href="@{/account/orders}" class="text-decoration-none">
                    <i class="bi bi-bag me-2"></i>Đơn hàng
                </a>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
