<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5" style="max-width: 400px">
<h2 class="mb-2 text-center">Quên mật khẩu</h2>
<p class="text-center text-muted mb-4">Nhập email tài khoản, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>

<div th:replace="~{fragments/alerts :: alerts}"></div>

<form th:action="@{/forgot-password}" method="post">
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               placeholder="example@gmail.com"
               required/>
    </div>
    <button type="submit" class="btn btn-dark w-100">Gửi link đặt lại mật khẩu</button>
</form>

<p class="mt-3 text-center">
    <a th:href="@{/auth/login}">← Quay lại đăng nhập</a>
</p>
</body>
</html>
