<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5" style="max-width: 400px">
<h2 class="mb-4 text-center">Đăng nhập</h2>

<div th:replace="~{fragments/alerts :: alerts}"></div>

<form th:action="@{/auth/login}" method="post">
    <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <input type="text" name="username" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" name="password" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-dark w-100 mb-3">Đăng nhập</button>
</form>
    <a th:href="@{/forgot-password}" class="btn btn-white w-100 border border-dark">Quên mật khẩu?</a>
<p class="mt-3 text-center">
    Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a>
</p>
</body>
</html>
