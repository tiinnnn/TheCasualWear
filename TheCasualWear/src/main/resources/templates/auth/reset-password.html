<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5" style="max-width: 400px">
<h2 class="mb-2 text-center">Đặt lại mật khẩu</h2>
<p class="text-center text-muted mb-4">Nhập mật khẩu mới cho tài khoản của bạn.</p>

<div th:replace="~{fragments/alerts :: alerts}"></div>

<form th:action="@{/forgot-password/reset}" method="post">
    <input type="hidden" name="token" th:value="${token}"/>

    <div class="mb-3">
        <label class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
        <input type="password" name="newPassword" id="newPassword"
               class="form-control" required/>
        <div class="form-text text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Mật khẩu phải chứa ít nhất 6 ký tự và chứa ít nhất 1 chữ số
        </div>
        <div class="mt-1" id="pwStrength"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Nhập lại mật khẩu <span class="text-danger">*</span></label>
        <input type="password" id="confirmPassword" name="confirmPassword"
               class="form-control" required/>
        <div class="invalid-feedback">Mật khẩu không khớp!</div>
    </div>

    <button type="submit" class="btn btn-dark w-100">Xác nhận</button>
</form>

<p class="mt-3 text-center">
    <a th:href="@{/auth/login}">← Quay lại đăng nhập</a>
</p>

<script>
    // Kiểm tra độ mạnh password
    document.getElementById('newPassword').addEventListener('input', function () {
        const pw = this.value;
        const div = document.getElementById('pwStrength');
        if (!pw) { div.innerHTML = ''; return; }

        const hasLength = pw.length >= 6;
        const hasNumber = /\d/.test(pw);

        if (hasLength && hasNumber) {
            div.innerHTML = '<small class="text-success">✓ Mật khẩu hợp lệ</small>';
        } else {
            let msg = [];
            if (!hasLength) msg.push('có 6 ký tự');
            if (!hasNumber) msg.push('có ít nhất 1 chữ số');
            div.innerHTML = '<small class="text-danger">✗ Cần: ' + msg.join(', ') + '</small>';
        }
    });

    // Kiểm tra confirm password
    document.getElementById('confirmPassword').addEventListener('input', function () {
        const pw = document.getElementById('newPassword').value;
        if (this.value !== pw) {
            this.classList.add('is-invalid');
            this.classList.remove('is-valid');
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
        }
    });
</script>
</body>
</html>
