<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5" style="max-width: 400px">
<h2 class="mb-4 text-center">Đăng ký</h2>

<div th:replace="~{fragments/alerts :: alerts}"></div>

<form th:action="@{/auth/register}" th:object="${user}" method="post">
    <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <input type="text" th:field="*{username}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text" th:field="*{phone}" class="form-control"/>
    </div>
    <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" th:field="*{password}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label class="form-label">Nhập lại mật khẩu</label>
        <input type="password" name="confirmPassword" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-dark w-100">Đăng ký</button>
</form>

<p class="mt-3 text-center">
    Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a>
</p>
</body>
</html>
