<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-5" style="max-width:450px">
<h2 class="mb-4 text-center fw-bold">Đăng ký</h2>

<div th:replace="~{fragments/alerts :: alerts}"></div>

<form th:action="@{/auth/register}" th:object="${user}" method="post">
    <div class="mb-3">
        <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
        <input type="text" th:field="*{username}" class="form-control" required/>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Email
            <span class="text-muted small">(* cần ít nhất Email hoặc SĐT)</span>
        </label>
        <input type="email" th:field="*{email}" class="form-control"
               placeholder="example@gmail.com"/>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Số điện thoại
            <span class="text-muted small">(* cần ít nhất Email hoặc SĐT)</span>
        </label>
        <input type="text" th:field="*{phone}" class="form-control"
               placeholder="0901234567"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
        <input type="password" th:field="*{password}" id="password"
               class="form-control" required/>
        <div class="form-text text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Mật khẩu phải chứa ít nhất 6 ký tự và chứa ít nhất 1 chữ số
        </div>
        <!-- Password strength indicator -->
        <div class="mt-1" id="pwStrength"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Nhập lại mật khẩu <span class="text-danger">*</span></label>
        <input type="password" id="confirmPassword" name="confirmPassword"
               class="form-control" required/>
        <div class="invalid-feedback">Mật khẩu không khớp!</div>
    </div>

    <button type="submit" class="btn btn-dark w-100">Đăng ký</button>
</form>

<p class="mt-3 text-center">
    Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a>
</p>

<script>
    // Kiểm tra độ mạnh password
    document.getElementById('password').addEventListener('input', function() {
        const pw = this.value;
        const div = document.getElementById('pwStrength');
        if (!pw) { div.innerHTML = ''; return; }

        const hasLength = pw.length >= 6;
        const hasNumber = /\d/.test(pw);

        if (hasLength && hasNumber) {
            div.innerHTML = '<small class="text-success">✓ Mật khẩu hợp lệ</small>';
        } else {
            let msg = [];
            if (!hasLength) msg.push('có 6 ký tự');
            if (!hasNumber) msg.push('có ít nhất 1 chữ số');
            div.innerHTML = '<small class="text-danger">✗ Cần: ' + msg.join(', ') + '</small>';
        }
    });

    // Kiểm tra confirm password
    document.getElementById('confirmPassword').addEventListener('input', function() {
        const pw = document.getElementById('password').value;
        if (this.value !== pw) {
            this.classList.add('is-invalid');
        } else {
            this.classList.remove('is-invalid');
            this.classList.add('is-valid');
        }
    });

    // Validate email hoặc phone trước khi submit
    document.querySelector('form').addEventListener('submit', function(e) {
        const email = document.querySelector('[name="email"]').value.trim();
        const phone = document.querySelector('[name="phone"]').value.trim();
        if (!email && !phone) {
            e.preventDefault();
            alert('Vui lòng nhập ít nhất Email hoặc Số điện thoại!');
        }
    });
</script>
</body>
</html>
