<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Quản lý đơn hàng</title></head>
<body>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold">
        Quản lý đơn hàng
        <small class="text-muted fs-6"
               th:text="'(' + ${totalItems} + ' đơn)'"></small>
    </h4>
</div>

<!-- Search + Filter -->
<form th:action="@{/admin/orders}" method="get" class="d-flex gap-2 mb-3">
    <input type="text" name="keyword" th:value="${keyword}"
           class="form-control" placeholder="Tìm theo tên khách hàng..."/>
    <select name="status" class="form-select w-auto" onchange="this.form.submit()">
        <option value="">Tất cả trạng thái</option>
        <option value="PENDING"   th:selected="${selectedStatus == 'PENDING'}">Chờ xác nhận</option>
        <option value="CONFIRMED" th:selected="${selectedStatus == 'CONFIRMED'}">Đã xác nhận</option>
        <option value="SHIPPING"  th:selected="${selectedStatus == 'SHIPPING'}">Đang giao</option>
        <option value="DELIVERED" th:selected="${selectedStatus == 'DELIVERED'}">Đã giao</option>
        <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Hoàn thành</option>
        <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Đã hủy</option>
    </select>
    <button type="submit" class="btn btn-dark">Tìm</button>
    <a th:if="${keyword != null or selectedStatus != null}"
       th:href="@{/admin/orders}" class="btn btn-outline-secondary">✕</a>
</form>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Khách hàng</th>
                <th>Ngày đặt</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="6" class="text-center text-muted py-4">
                    Không tìm thấy đơn hàng nào!
                </td>
            </tr>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td>
                    <p class="mb-0 fw-bold"
                       th:text="${order.customer.username}"></p>
                    <small class="text-muted"
                           th:text="${order.shippingAddress != null ?
                                         order.shippingAddress.phone : ''}"></small>
                </td>
                <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                <td class="text-danger fw-bold"
                    th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></td>
                <td>
                        <span th:switch="${order.status.name()}">
                            <span th:case="'PENDING'"   class="badge bg-warning text-dark">Chờ xác nhận</span>
                            <span th:case="'CONFIRMED'" class="badge bg-info">Đã xác nhận</span>
                            <span th:case="'SHIPPING'"  class="badge bg-primary">Đang giao</span>
                            <span th:case="'DELIVERED'" class="badge bg-success">Đã giao</span>
                            <span th:case="'COMPLETED'" class="badge bg-success">Hoàn thành</span>
                            <span th:case="'CANCELLED'" class="badge bg-danger">Đã hủy</span>
                        </span>
                </td>
                <td>
                    <a th:href="@{'/admin/orders/' + ${order.id}}"
                       class="btn btn-sm btn-outline-dark">Chi tiết</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Pagination -->
<div th:if="${totalPages > 1}"
     class="d-flex justify-content-center mt-4">
    <nav>
        <ul class="pagination">
            <li class="page-item"
                th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/orders(page=${currentPage-1},
                                           keyword=${keyword},
                                           status=${selectedStatus})}">←</a>
            </li>
            <li th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                class="page-item"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/orders(page=${i},
                                           keyword=${keyword},
                                           status=${selectedStatus})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item"
                th:classappend="${currentPage == totalPages-1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/orders(page=${currentPage+1},
                                           keyword=${keyword},
                                           status=${selectedStatus})}">→</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
