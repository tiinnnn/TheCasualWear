<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý sản phẩm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-4">

  <h2>Danh sách sản phẩm</h2>

  <table class="table table-bordered table-striped">
    <thead>
    <tr>
      <th>ID</th>
      <th>Tên</th>
      <th>SKU</th>
      <th>Giá bán</th>
      <th>Tồn kho</th>
      <th>Giá vốn</th>
      <th>Danh mục</th>
      <th>Kích thước</th>
      <th>Màu sắc</th>
      <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
      <td th:text="${p.id}"></td>
      <td th:text="${p.name}"></td>
      <td th:text="${p.sku}"></td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.stock}"></td>
      <td th:text="${p.costPrice}"></td>
      <td th:text="${p.category != null ? p.category.name : ''}"></td>
      <td th:text="${p.size != null ? p.size.name : ''}"></td>
      <td th:text="${p.color != null ? p.color.name : ''}"></td>
      <td>
        <a th:href="@{'/admin/products/' + ${p.id}}" class="btn btn-sm btn-primary">Sửa</a>
        <a th:href="@{'/admin/products/' + ${p.id} + '/delete'}" class="btn btn-sm btn-danger"
           onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
      </td>
    </tr>
    </tbody>
  </table>

  <hr/>

  <h2 th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}"></h2>
  <form th:action="@{/admin/products/save}" th:object="${product}" method="post" class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Tên sản phẩm</label>
      <input type="text" th:field="*{name}" class="form-control"/>
      <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="col-md-6">
      <label class="form-label">SKU</label>
      <input type="text" th:field="*{sku}" class="form-control"/>
      <span class="text-danger" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></span>
    </div>

    <div class="col-md-6">
      <label class="form-label">Giá bán</label>
      <input type="number" step="0.01" th:field="*{price}" class="form-control"/>
      <span class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
    </div>

    <div class="col-md-6">
      <label class="form-label">Tồn kho</label>
      <input type="number" th:field="*{stock}" class="form-control"/>
      <span class="text-danger" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
    </div>

    <div class="col-md-6">
      <label class="form-label">Giá vốn</label>
      <input type="number" step="0.01" th:field="*{costPrice}" class="form-control"/>
      <span class="text-danger" th:if="${#fields.hasErrors('costPrice')}" th:errors="*{costPrice}"></span>
    </div>

    <div class="col-md-6">
      <label class="form-label">Danh mục</label>
      <select th:field="*{category}" class="form-select">
        <option th:each="c : ${categories}" th:value="${c}" th:text="${c.name}"></option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Kích thước</label>
      <select th:field="*{size}" class="form-select">
        <option th:each="s : ${sizes}" th:value="${s}" th:text="${s.name}"></option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Màu sắc</label>
      <select th:field="*{color}" class="form-select">
        <option th:each="cl : ${colors}" th:value="${cl}" th:text="${cl.name}"></option>
      </select>
    </div>

    <div class="col-12">
      <label class="form-label">Mô tả</label>
      <textarea th:field="*{description}" class="form-control"></textarea>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-success">Lưu</button>
      <a th:href="@{/admin/products}" class="btn btn-secondary">Hủy</a>
    </div>
  </form>
</body>
</html>
