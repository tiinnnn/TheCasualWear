<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Delivery - The Casual Wear</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
</head>
<body>
<!-- navbar -->
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/delivery}">
            <i class="bi bi-truck"></i> Delivery Panel
        </a>
        <div class="d-flex align-items-center gap-3">
                <span class="text-warning">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name"></span>
                </span>
            <a class="btn btn-outline-danger btn-sm" th:href="@{/auth/logout}">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container mt-4" style="min-height: 600px;">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div th:replace="~{${view}}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
