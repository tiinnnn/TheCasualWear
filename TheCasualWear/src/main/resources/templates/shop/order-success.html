<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Đặt hàng thành công</title></head>
<body>
<div class="text-center py-5">
    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
    <h3 class="mt-3">Đặt hàng thành công!</h3>
    <p class="text-muted">Mã đơn hàng: <strong th:text="'#' + ${order.id}"></strong></p>
    <p class="text-muted">Trạng thái: <span class="badge bg-warning"
                                            th:text="${order.status}"></span></p>
    <div class="d-flex gap-3 justify-content-center mt-4">
        <a th:href="@{/order/detail/__${order.id}__}" class="btn btn-dark">Xem đơn hàng</a>
        <a th:href="@{/shop}" class="btn btn-outline-dark">Tiếp tục mua sắm</a>
    </div>
</div>
</body>
</html>
