<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Lịch sử đơn hàng</title></head>
<body>
<h3 class="mb-4">Lịch sử đơn hàng</h3>

<div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
    <p class="text-muted">Bạn chưa có đơn hàng nào!</p>
    <a th:href="@{/shop}" class="btn btn-dark">Mua sắm ngay</a>
</div>

<div th:unless="${#lists.isEmpty(orders)}">
    <div th:each="order : ${orders}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-1">Đơn hàng <strong th:text="'#' + ${order.id}"></strong></h6>
                    <small class="text-muted"
                           th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></small>
                </div>
                <div class="text-end">
                    <!-- Status badge -->
                    <span th:switch="${order.status.name()}">
                        <span th:case="'PENDING'"   class="badge bg-warning">Chờ xác nhận</span>
                        <span th:case="'CONFIRMED'" class="badge bg-info">Đã xác nhận</span>
                        <span th:case="'SHIPPING'"  class="badge bg-primary">Đang giao</span>
                        <span th:case="'DELIVERED'" class="badge bg-success">Đã giao</span>
                        <span th:case="'COMPLETED'" class="badge bg-success">Hoàn thành</span>
                        <span th:case="'CANCELLED'" class="badge bg-danger">Đã hủy</span>
                    </span>
                    <p class="text-danger fw-bold mt-1"
                       th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></p>
                </div>
            </div>
            <div class="d-flex gap-2 mt-2">
                <a th:href="@{'/order/detail/' + ${order.id}}"
                   class="btn btn-sm btn-outline-dark">Xem chi tiết</a>
                <a th:if="${order.status.name() == 'PENDING'}"
                   th:href="@{'/order/cancel/' + ${order.id}}"
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">Hủy đơn</a>
                <a th:if="${order.status.name() == 'DELIVERED'}"
                   th:href="@{'/order/confirm/' + ${order.id}}"
                   class="btn btn-sm btn-success"
                   onclick="return confirm('Xác nhận đã nhận hàng?')">Đã nhận hàng</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
