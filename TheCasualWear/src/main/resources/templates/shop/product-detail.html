<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title th:text="${product.name}"></title></head>
<body>
<div class="container">
    <div class="row">
        <!-- Ảnh sản phẩm - Slideshow -->
        <div class="col-md-6">
            <div th:if="${product.images != null and !product.images.isEmpty()}">
                <!-- Ảnh chính -->
                <div id="productCarousel" class="carousel slide mb-2" data-bs-ride="false">
                    <div class="carousel-inner">
                        <div th:each="img, i : ${product.images}"
                             th:classappend="${i.index == 0} ? 'active'"
                             class="carousel-item">
                            <img th:src="${img.imageUrl}"
                                 class="d-block w-100 rounded"
                                 style="height:450px;object-fit:cover"/>
                        </div>
                    </div>
                    <!-- Prev/Next chỉ hiện khi có > 1 ảnh -->
                    <div th:if="${product.images.size() > 1}">
                        <button class="carousel-control-prev" type="button"
                                data-bs-target="#productCarousel" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon"></span>
                        </button>
                        <button class="carousel-control-next" type="button"
                                data-bs-target="#productCarousel" data-bs-slide="next">
                            <span class="carousel-control-next-icon"></span>
                        </button>
                    </div>
                </div>

                <!-- Thumbnail bên dưới -->
                <div th:if="${product.images.size() > 1}"
                     class="d-flex gap-2 flex-wrap">
                    <img th:each="img, i : ${product.images}"
                         th:src="${img.imageUrl}"
                         th:attr="data-index=${i.index}"
                         onclick="goToSlide(this.dataset.index)"
                         class="rounded border border-2"
                         style="width:70px;height:70px;object-fit:cover;cursor:pointer;opacity:0.6"
                         th:style="${i.index == 0} ? 'width:70px;height:70px;object-fit:cover;cursor:pointer;opacity:1;border-color:#000!important' : 'width:70px;height:70px;object-fit:cover;cursor:pointer;opacity:0.6'"/>
                </div>
            </div>

            <!-- Không có ảnh -->
            <img th:unless="${product.images != null and !product.images.isEmpty()}"
                 src="/images/no-image.png"
                 class="img-fluid rounded" style="height:450px;object-fit:cover;width:100%"/>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-6">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/shop}">Shop</a></li>
                    <li class="breadcrumb-item active" th:text="${product.name}"></li>
                </ol>
            </nav>

            <h2 class="fw-bold" th:text="${product.name}"></h2>
            <p class="text-muted"
               th:text="${product.category != null ? product.category.name : ''}"></p>

            <h3 class="text-danger fw-bold my-3"
                th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + ' đ'}"></h3>

            <div class="mb-3">
                <div th:if="${product.color != null}" class="mb-2">
                    <small class="text-muted">Màu sắc:</small>
                    <span class="fw-bold ms-1" th:text="${product.color.name}"></span>
                </div>
                <div>
                    <small class="text-muted d-block">Tình trạng:</small>
                    <span th:if="${product.stock > 0}" class="badge bg-success"
                          th:text="'Còn ' + ${product.stock} + ' sản phẩm'"></span>
                    <span th:unless="${product.stock > 0}" class="badge bg-danger">Hết hàng</span>
                </div>
            </div>

            <!-- Chọn size — thêm vào đây -->
            <div class="mb-3" th:if="${variants != null and !variants.isEmpty()}">
                <small class="text-muted d-block mb-2">Chọn size:</small>
                <div class="d-flex gap-2 flex-wrap">
                    <a th:each="v : ${variants}"
                       th:href="@{'/product/' + ${v.id}}"
                       th:classappend="${v.id == product.id} ? ' btn-dark active' : ' btn-outline-dark'"
                       class="btn btn-sm"
                       th:text="${v.size != null ? v.size.name : 'One size'}"
                       th:title="${v.stock > 0 ? 'Còn ' + v.stock + ' sản phẩm' : 'Hết hàng'}"
                       th:style="${v.stock == 0} ? 'opacity:0.4;text-decoration:line-through'">
                    </a>
                </div>
            </div>

            <p class="text-muted" th:text="${product.description}"></p>

            <hr/>

            <!-- Thêm vào giỏ -->
            <form th:action="@{/cart/add}" method="post"
                  th:if="${product.stock > 0}">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <div class="d-flex gap-2 align-items-center mb-3">
                    <label class="form-label mb-0">Số lượng:</label>
                    <div class="input-group" style="width:130px">
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="changeQty(-1)">-</button>
                        <input type="number" id="qtyInput" name="quantity"
                               value="1" min="1" th:max="${product.stock}"
                               class="form-control text-center"/>
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="changeQty(1)">+</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2">
                    <i class="bi bi-cart-plus me-2"></i>Thêm vào giỏ hàng
                </button>
            </form>

            <div th:unless="${product.stock > 0}" class="alert alert-danger mt-3">
                Sản phẩm tạm hết hàng!
            </div>
        </div>
    </div>

    <!-- Sản phẩm liên quan -->
    <div th:if="${relatedProducts != null and !relatedProducts.isEmpty()}" class="mt-5">
        <h4 class="mb-3 fw-bold">Sản phẩm liên quan</h4>
        <div class="row row-cols-2 row-cols-md-4 g-4">
            <div class="col" th:each="p : ${relatedProducts}">
                <a th:href="@{'/product/' + ${p.id}}" class="text-decoration-none text-dark">
                    <div class="card h-100 border-0 shadow-sm"
                         style="cursor:pointer;transition:transform 0.2s"
                         onmouseover="this.style.transform='translateY(-4px)'"
                         onmouseout="this.style.transform='translateY(0)'">
                        <img th:if="${p.images != null and !p.images.isEmpty()}"
                             th:src="${p.images[0].imageUrl}"
                             class="card-img-top" style="height:220px;object-fit:cover"/>
                        <img th:unless="${p.images != null and !p.images.isEmpty()}"
                             src="/images/no-image.png"
                             class="card-img-top" style="height:220px;object-fit:cover"/>
                        <div class="card-body">
                            <h6 class="card-title" th:text="${p.name}"></h6>
                            <p class="text-danger fw-bold mb-0"
                               th:text="${#numbers.formatInteger(p.price, 0, 'COMMA') + ' đ'}"></p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Đợi Bootstrap load xong
    document.addEventListener('DOMContentLoaded', function () {
        const carouselEl = document.getElementById('productCarousel');
        if (!carouselEl) return;

        const carousel = new bootstrap.Carousel(carouselEl, { ride: false });

        // Click thumbnail → chuyển slide
        document.querySelectorAll('[data-index]').forEach(thumb => {
            thumb.addEventListener('click', function () {
                const index = parseInt(this.dataset.index);
                carousel.to(index);
                updateThumbnail(index);
            });
        });

        carouselEl.addEventListener('slid.bs.carousel', function (e) {
            updateThumbnail(e.to);
        });

        // Highlight thumbnail đang active
        function updateThumbnail(index) {
            document.querySelectorAll('[data-index]').forEach(img => {
                img.style.opacity = '0.5';
                img.style.border = '2px solid transparent';
            });
            const active = document.querySelector('[data-index="' + index + '"]');
            if (active) {
                active.style.opacity = '1';
                active.style.border = '2px solid #000';
            }
        }

        updateThumbnail(0);
    });

    function changeQty(delta) {
        const input = document.getElementById('qtyInput');
        const max = parseInt(input.max);
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        if (val > max) val = max;
        input.value = val;
    }
</script>
</body>
</html>
