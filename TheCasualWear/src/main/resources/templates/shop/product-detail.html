<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title th:text="${product.name}"></title></head>
<body>
<div class="container">
    <div class="row mt-4">
        <!-- Ảnh sản phẩm -->
        <div class="col-md-6">
            <img th:if="${product.images != null and !product.images.isEmpty()}"
                 th:src="${product.images[0].imageUrl}"
                 class="img-fluid rounded" style="max-height:500px;object-fit:cover;width:100%"/>
            <img th:unless="${product.images != null and !product.images.isEmpty()}"
                 src="/images/no-image.png"
                 class="img-fluid rounded"/>

            <!-- Ảnh phụ -->
            <div class="d-flex gap-2 mt-2" th:if="${product.images.size() > 1}">
                <img th:each="img,i : ${product.images}"
                     th:if="${i.index > 0}"
                     th:src="${img.imageUrl}"
                     class="rounded" style="width:80px;height:80px;object-fit:cover;cursor:pointer"/>
            </div>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-6">
            <h2 th:text="${product.name}"></h2>
            <p class="text-muted"
               th:text="${product.category != null ? product.category.name : ''}"></p>
            <h3 class="text-danger"
                th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + ' đ'}"></h3>
            <div class="d-flex gap-3 text-muted small mb-3">
                <span th:if="${product.size != null}"
                      th:text="'Size: ' + ${product.size.name}"></span>
                <span th:if="${product.color != null}"
                      th:text="'Màu: ' + ${product.color.name}"></span>
                <span th:text="'Còn: ' + ${product.stock} + ' sản phẩm'"></span>
            </div>
            <p th:text="${product.description}"></p>

            <!-- Thêm vào giỏ -->
            <form th:action="@{/cart/add}" method="post" class="mt-3">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <input type="number" name="quantity" value="1" min="1"
                       th:max="${product.stock}" class="form-control w-25 mb-2"/>
                <button type="submit" class="btn btn-dark w-auto px-5">
                    Thêm vào giỏ hàng
                </button>
            </form>

        </div>
    </div>

    <!-- Sản phẩm liên quan -->
    <div th:if="${relatedProducts != null and !relatedProducts.isEmpty()}" class="mt-5">
        <h4 class="mb-3">Sản phẩm liên quan</h4>
        <div class="row row-cols-2 row-cols-md-4 g-4">
            <div class="col" th:each="p : ${relatedProducts}">
                <div class="card h-100">
                    <img th:if="${p.images != null and !p.images.isEmpty()}"
                         th:src="${p.images[0].imageUrl}"
                         class="card-img-top" style="height:200px;object-fit:cover"/>
                    <div class="card-body">
                        <h6 class="card-title" th:text="${p.name}"></h6>
                        <p class="text-danger fw-bold"
                           th:text="${#numbers.formatInteger(p.price, 0, 'COMMA') + ' đ'}"></p>
                        <a th:href="@{'/product/' + ${p.id}}"
                           class="btn btn-outline-dark btn-sm w-100">Xem chi tiết</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
