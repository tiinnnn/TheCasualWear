<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Trang chủ</title></head>
<body>

<!-- Banner -->
<div class="text-white text-center mb-4"
     style="background-image: url('/images/banner.jpg');
            background-size: cover;
            background-position: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;">
    <h1 class="fw-bold display-4">THE CASUAL WEAR</h1>
    <p class="fs-5">Thời trang nam phong cách</p>
    <a th:href="@{/shop}" class="btn btn-light btn-lg px-5">Mua ngay</a>
</div>

<!-- Sản phẩm mới nhất -->
<div class="container">
<h2 class="mb-4">Sản phẩm mới nhất</h2>
    <div class="row row-cols-2 row-cols-md-4 g-4">
        <div class="col" th:each="p : ${newestProducts}">
            <a th:href="@{'/product/' + ${p.id}}" class="text-decoration-none text-dark">
                <div class="card h-100 border-0 shadow-sm" style="cursor:pointer;transition:transform 0.2s"
                     onmouseover="this.style.transform='translateY(-4px)'"
                     onmouseout="this.style.transform='translateY(0)'">
                    <img th:if="${p.images != null and !p.images.isEmpty()}"
                         th:src="${p.images[0].imageUrl}"
                         class="card-img-top" style="height:280px;object-fit:cover"/>
                    <img th:unless="${p.images != null and !p.images.isEmpty()}"
                         src="/images/no-image.png"
                         class="card-img-top" style="height:280px;object-fit:cover"/>
                    <div class="card-body">
                        <h6 class="card-title" th:text="${p.name}"></h6>
                        <p class="text-muted small mb-1"
                           th:text="${p.category != null ? p.category.name : ''}"></p>
                        <p class="text-danger fw-bold mb-0"
                           th:text="${#numbers.formatInteger(p.price, 0, 'COMMA') + ' đ'}"></p>
                    </div>
                </div>
            </a>
        </div>
    </div>

<div class="text-center mt-4">
    <a th:href="@{/shop}" class="btn btn-outline-dark">Xem tất cả</a>
</div>
</div>
</body>
</html>
