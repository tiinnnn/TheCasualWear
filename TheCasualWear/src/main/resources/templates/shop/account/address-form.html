<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Địa chỉ</title></head>
<body>
<div class="container">
<div class="row">
    <div class="col-md-3">
        <div th:replace="~{fragments/account-menu :: account-menu}"></div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-body">
                <h5 class="mb-4"
                    th:text="${address.id == null ? 'Thêm địa chỉ mới' : 'Cập nhật địa chỉ'}"></h5>
                <form th:action="${address.id == null ? '/account/address/add' : '/account/address/edit/' + address.id}"
                      th:object="${address}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Họ tên</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Địa chỉ</label>
                        <input type="text" th:field="*{street}" class="form-control" required/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Quận/Huyện</label>
                            <input type="text" th:field="*{district}" class="form-control"/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tỉnh/Thành phố</label>
                            <input type="text" th:field="*{city}" class="form-control" required/>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Lưu</button>
                        <a th:href="@{/account/address}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
