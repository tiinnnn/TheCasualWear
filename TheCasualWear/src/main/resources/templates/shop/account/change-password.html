<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Đổi mật khẩu</title></head>
<body>
<div class="container">
<div class="row">
    <div class="col-md-3">
        <div th:replace="~{fragments/account-menu :: account-menu}"></div>
    </div>
    <div class="col-md-9">
        <div class="card">
            <div class="card-body">
                <h5 class="mb-4">Đổi mật khẩu</h5>
                <form th:action="@{/account/change-password}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu cũ</label>
                        <input type="password" name="oldPassword" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mật khẩu mới</label>
                        <input type="password" name="newPassword" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nhập lại mật khẩu mới</label>
                        <input type="password" name="confirmPassword" class="form-control" required/>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">Đổi mật khẩu</button>
                        <a th:href="@{/account}" class="btn btn-outline-secondary">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
</body>
</html>
