<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Chi tiết đơn hàng</title></head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Chi tiết đơn hàng <strong th:text="'#' + ${order.id}"></strong></h4>
        <a th:href="@{/account/orders}" class="btn btn-outline-dark btn-sm">← Quay lại</a>
    </div>

    <!-- Trạng thái đơn hàng -->
    <div class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <small class="text-muted">Ngày đặt:</small>
                    <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                </div>
                <span th:switch="${order.status.name()}">
                    <span th:case="'PENDING'"   class="badge bg-warning text-dark fs-6">Chờ xác nhận</span>
                    <span th:case="'CONFIRMED'" class="badge bg-info fs-6">Đã xác nhận</span>
                    <span th:case="'SHIPPING'"  class="badge bg-primary fs-6">Đang giao</span>
                    <span th:case="'DELIVERED'" class="badge bg-success fs-6">Đã giao</span>
                    <span th:case="'COMPLETED'" class="badge bg-success fs-6">Hoàn thành</span>
                    <span th:case="'CANCELLED'" class="badge bg-danger fs-6">Đã hủy</span>
                </span>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- Danh sách sản phẩm -->
        <div class="col-md-8">
            <div class="card mb-3">
                <div class="card-body">
                    <h6 class="mb-3">Sản phẩm đã đặt</h6>
                    <div th:each="detail : ${order.orderDetails}"
                         class="d-flex justify-content-between align-items-center mb-3">
                        <div class="d-flex align-items-center gap-3">
                            <img th:if="${detail.product.images != null and !detail.product.images.isEmpty()}"
                                 th:src="${detail.product.images[0].imageUrl}"
                                 style="width:60px;height:60px;object-fit:cover" class="rounded"/>
                            <img th:unless="${detail.product.images != null and !detail.product.images.isEmpty()}"
                                 src="/images/no-image.png"
                                 style="width:60px;height:60px;object-fit:cover" class="rounded"/>
                            <div>
                                <p class="mb-0 fw-bold" th:text="${detail.product.name}"></p>
                                <small class="text-muted"
                                       th:text="'x' + ${detail.quantity}"></small>
                            </div>
                        </div>
                        <span class="fw-bold text-danger"
                              th:text="${#numbers.formatInteger(detail.price.doubleValue() * detail.quantity, 0, 'COMMA') + ' đ'}"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thông tin đơn hàng -->
        <div class="col-md-4">
            <!-- Địa chỉ giao hàng -->
            <div class="card mb-3">
                <div class="card-body">
                    <h6>Địa chỉ giao hàng</h6>
                    <p class="mb-1 fw-bold"
                       th:text="${order.shippingAddress.fullName}"></p>
                    <p class="mb-1 text-muted"
                       th:text="${order.shippingAddress.phone}"></p>
                    <p class="mb-0 small"
                       th:text="${order.shippingAddress.street + ', ' +
                                  order.shippingAddress.district + ', ' +
                                  order.shippingAddress.city}"></p>
                </div>
            </div>

            <!-- Tổng tiền -->
            <div class="card">
                <div class="card-body">
                    <h6>Tổng đơn hàng</h6>
                    <div class="d-flex justify-content-between fw-bold">
                        <span>Tổng cộng:</span>
                        <span class="text-danger"
                              th:text="${#numbers.formatInteger(order.totalPrice, 0, 'COMMA') + ' đ'}"></span>
                    </div>
                </div>
            </div>

            <!-- Nút hành động -->
            <div class="mt-3 d-grid gap-2">
                <a th:if="${order.status.name() == 'PENDING'}"
                   th:href="@{'/order/cancel/' + ${order.id}}"
                   class="btn btn-outline-danger"
                   onclick="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
                    Hủy đơn hàng
                </a>
                <a th:if="${order.status.name() == 'DELIVERED'}"
                   th:href="@{'/order/confirm/' + ${order.id}}"
                   class="btn btn-success"
                   onclick="return confirm('Xác nhận đã nhận hàng?')">
                    Đã nhận hàng
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
